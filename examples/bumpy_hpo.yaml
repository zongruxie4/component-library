# =======================
# Static parameters - passed to the underlying training script as is
# =======================  
  
static:
  global-mu: 23 42 66

# =======================
# WLM plugin configuration
# Keys are forwarded to the WLM plugin as ITERATE_WLM_<KEY> env vars.
# Omit this section entirely when running locally (no --wlm-plugin).
# =======================
# wlm:
#   gpu-count: 1
#   cpu-count: 4
#   mem-gb: 32
  
# ========================
# Training hyperparameters - evaluated by optuna and passed to the underlying training script
# ========================

hpo:
  x:
    type: float
    low: 1
    high: 100
    log: true

  y:
    type: float
    low: 1
    high: 100
    log: true

  z:
    type: float
    low: 1
    high: 100
    log: true

